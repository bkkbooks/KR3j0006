body:
  text: 王鈇第九龐子問鶡冠子曰泰上成鳩之道一族用之萬八千歲有天下兵強世不可奪與天地存久絶無倫齊殊異之物不足以命其相去之不同也世莫不言樹俗立化彼獨何道之行以至於此鶡冠子曰彼成鳩氏天故莫能增其高尊其靈龐子曰何謂天何若而莫能增其高尊其靈鶡冠子曰天者誠其日德也日誠出誠入南北有極故莫弗以為法則天者信其月刑也月信死信生終則有始故莫弗以為政天者明星其稽也列星不亂各以序行故小大莫弗以章天者因時其則也四時當名代而不干故莫弗以為必然天者一法其同也前後左右古今自如故莫弗以為常天誠信明因一不為衆父易一故莫能與爭先易一非一故不可尊增成鳩得一故莫不仰制焉龐子曰願聞其制鶡冠子曰成鳩之制與神明體正神明者下究而上際克嗇萬物而不可猒者也周泊遍照反與天地總故能為天下計明於蚤識逄曰不惑存亡之祥安危之稽龐子曰願聞其稽鶡冠子曰置下不安上不可以載纍其足也其最高而不植局者未之有也辨於人情究物之理稱於天地廢置不殆審於山川而運動舉錯有檢生物無害為之父母無所𨈆躒仁於取豫備於教道要於言語信於約束已諾不專喜怒不增其兵不武樹以為俗其化出此龐子曰願聞其人情物理所以嗇萬物與天地總與神明體正之道鶡冠子曰成鳩氏之道未有離天曲日術者天曲者明而易循也日術者要而易行也龐子曰願聞天曲日術鶡冠子曰其制邑理都使矔習者五家為伍伍為之長十伍為里里置有司四里為扁扁為之長十扁為鄉鄉置師五鄉為縣縣有嗇夫治焉十縣為郡有大夫守焉命曰官屬郡大夫退修其屬縣嗇夫退修其鄉鄉師退修其扁扁長退修其里里有司退修其伍伍長退修其家事相斥正居處相察出入相司父與父言義子與子言孝長者言善少者言敬旦夕相薰薌以此慈孝之務若有所移徙去就家與家相受人與人相付亡人姦物無所穿竄此其人情物理也伍人有勿故不奉上令有餘不足居處之狀而不輒以告里有司謂之亂家其罪伍長以同里中有不敬長慈少出等異衆不聽父兄之教有所受聞不悉以告扁長謂之亂里其罪有司而二其家扁不以時循行教誨受聞不悉以告鄉師謂之亂扁其罪扁長而二其家鄉不以時循行教誨受聞不悉以告縣嗇夫謂之亂鄉其罪鄉師而二其家縣嗇夫不以時循行教誨受聞不悉以告郡善者不顯命曰蔽明見惡而隱命曰下比謂之亂縣其誅嗇夫無赦郡大夫不以時循行教誨受聞雖實有所遺脫不悉以教柱國謂之亂郡其誅郡大夫無赦柱國不政使下情不上聞上情不下究謂之絿政其誅柱國滅門殘疾令尹不宜時合地害百姓者謂之亂天下其軫令尹以徇此其所以嗇物也天用四時地用五行天子執一以居中央調以五音正以六律紀以度數宰以刑德從本至末第以甲乙天始於元地始於朔四時始於歷故家里用提扁長用旬鄉師用節縣嗇夫用月郡大夫用氣分所至柱國用六律里五日報扁扁十日報鄉鄉十五日報縣縣三十日報郡郡四十五日報柱國柱國六十日以聞天子天子七十二日遣使勉有功罰不如此所以與天地總下情六十日一上聞上惠七十二日一下究此天曲日術也故不肖者不失其賤而賢者不失其明上享其福祿而百事理行畔者不利故莫能撓其強是以能治滿而不溢綰大而不芒天子中正使者敢易言尊益區域使利逜下蔽上其刑斬笞無赦諸吏教苦德薄侵暴百姓輒罷毋使汙官亂治不奉令犯法其罪加民利而不取利運而不取次故四方從之唯恐後至是以運天而維張地廣而德章天下安樂設年豫昌屬各以一時典最上賢不如令尹令尹以聞一再削職三則不赦治不踰官使史李不誤公市為平生者不喜死者不怨人得所欲國無變故著賞有功德及三世父伏其辜不得創諡事從一二終古不勃彼計為善於鄉不如為善於里為善於里不如為善於家是以為善者可得舉為惡者可得誅莫敢道一旦之善皆以終身為期素無失次故化立而世無邪化立俗成少則同儕長則同友遊敖同區祭祀同福死生同愛禍災同憂居處同樂行作同和弔賀同集哭泣同哀歡欣足以相助𠏄諜足以相止安平相馴軍旅相保夜戰則足以相信晝戰則足以相記入以禁暴出正無道是以其兵能橫行誅伐而莫之敢禦故其刑設而不用不爭而權重車甲不陳而天下無敵矣失道則賤敢逆貴不義則小敢侵大成鳩既見上世之嗣失道亡功倍本滅德之則故為之不朽之國定位牢祭使鬼神亶曰增規不圓益矩不方夫以效末傳之子孫唯此可持唯此可將將者養吉釋者不祥墠以全犧正以齊明四時享之祀以家王以為神享禮靈之符藏之宗廟以璽正諸故其後世之保教也全耳目不營用心不分不見異物而遷捐私去毒鉤於內哲固於所守更始逾新上元為紀共承嘉惠相高不改亶昭穆具招士先結之後入弗解此知極之至也龐子曰願聞所以不改更始逾新之道鶡冠子曰成鳩所謂得王鈇之傳者也龐子曰何謂王鈇鶡冠子曰王鈇者非一世之器也以死遂生從中制外之教也後世成至孫一靈羽理符日循功弗敢敗奉業究制執正守內拙弗敢廢樓𠝜與旱以新續故四時執效應錮不駿后得入廟惑爽不嗣謂之焚祖命冒世禮嗣弗引奉常弗內靈不食祀家王不舉祭天將降咎皇神不享此所以不改更始逾新之道也故主無異意民心不徙與天合則萬年一范則近者親其善遠者慕其德而無已是以其教不猒其用不弊故能疇合四海以為一家而夷貉萬國皆以時朝服致績而莫敢效增免聞者傳譯來歸其義莫能易其俗移其教故其威立而不犯流遠而不廢此素皇內帝之法成鳩之所枋以超等世世不可奪者也功日益月長故能與天地存久此所以與神明體正之術也不待士史蒼頡作書故後世莫能云其咎未聞不與道德究而能以為善者也龐子曰如是古今之道同邪鶡冠子曰古者亦我而使之久衆者亦我而使之衆耳何比異哉彼類善則萬世不忘道惡則禍及其身尚奚怪焉龐子曰以今之事觀古之道舟車相通衣服同采言語相知畫地守之不能相犯殊君異長不能相使逆言過耳兵甲相李百父母子且未易領方若所言未有離中國之正也丘第之業域不出著居不連垝而曰成鳩氏周闔四海為一家夷貉萬國莫不來朝其果情乎鶡冠子曰虎狼殺人烏蒼從上蚓蛾從下聚之六者異類然同時俱至者何也所欲同也由是觀之有人之名則同人之情耳何故不可乎天度數之而行在一不少在萬不衆同如林木積如倉粟斗石以陳升委無失也列地分民亦尚一也耳百父母子何能增減殊君異長又何出入若能正一萬國同極德至四海又奚足闔也龐子曰果必信然陰陽消散三百六十日各反其故天地局局奚足以疑聖人高大內揣深淺遠近之理使鬼神一失不復息矣與天地相蔽至今尚在以鉦面達行宜乎哉成鳩之萬八千歲也得此道者何辨誰氏所用之國而天下利耳
