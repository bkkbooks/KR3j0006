body:
  text: 度萬第八龐子問鶡冠子曰聖與神謀道與人成願聞度神慮成之要奈何鶡冠子曰天者神也地者形也地濕而火生焉天燥而水生焉法猛刑頗則神濕神濕則天不生水音故聲倒則形燥形燥則地不生火水火不生則陰陽無以成氣度量無以成制五勝無以成藝萬物無以成類百業俱絶萬生皆困濟濟混混孰知其故天人同文地人同理賢不肖殊能故上聖不可亂也下愚不可辨也陰陽者氣之正也天地者形神之正也聖人者德之正也法令者四時之正也故一義失此萬或亂彼所失甚少所敗甚衆所謂天者非是蒼蒼之氣之謂天也所謂地者非是膊膊之土之謂地也所謂天者言其然物而無勝者也所謂地者言其均物而不可亂者也音者其謀也聲者其事也音者天之三光也聲者地之五官也形神調則生理修夫生生而倍其本則德專己知無道上亂天文下滅地理中絶人和治漸終始故聽而無聞視而無見白晝而暗有義而失諡失諡而惑責人所無必人所不及相史於既而不盡其愛相區於成而不索其實虛名相高精白為黑動靜紐轉神絶復逆經氣不類形離正名五氣失端四時不成過生於上罪死於下有世將極驅馳索禍開門逃福賢良為笑愚者為國天咎先見菑害並雜人執兆生孰知其極見日月者不為明聞雷霆者不為聰事至而議者不能使變無生故善度變者觀本本足則盡不足則德必薄兵必老其執能以褊材為褒德博義者哉其文巧武果而姦不止者生於本不足也故主有二政臣有二制臣弗用主不能使臣必死主弗能止是以聖王獨見故主官以授長者在內和者在外夫長者之為官也在內則正義在外則固守用法則平治人本無害以端天地令出一原散無方化萬物者令也守一道制萬物者法也法也者守內者也令也者出制者也夫法不敗是令不傷理故君子得而尊小人得而謹胥靡得以全神備於心道備於形人以成則士以為繩列時第氣以授當名故法錯而陰陽調凰凰者鶉火之禽陽之精也騏麟者玄枵之獸陰之精也萬民者德之精也德能致之其精畢至龐子曰致之奈何鶡冠子曰天地陰陽取稽於身故布五正以司五明十變九道稽從身始五音六律稽從身出五五二十五以理天下六六三十六以為歲式氣由神生道由神成唯聖人能正其音調其聲故其德上反太清下及泰寧中及萬靈膏露降白丹發醴泉出朱草生衆祥具故萬口云帝制神化景星光潤文則寢天下之兵武則天下之兵莫能當遠之近顯乎隱大乎小衆乎少莫不從微始故得之所成不可勝形失之所敗不可勝名從是往者子弗能勝問吾亦弗勝言凡問之要欲近知而遠見以一度萬也無欲之君不可與舉賢人不用弗能使國利此其要也龐子曰敢問五正鶡冠子曰有神化有官治有教治有因治有事治龐子曰願聞其形鶡冠子曰神化者於未有官治者道於本教治者修諸己因治者不變俗事治者矯之於末龐子曰願聞其事鶡冠子曰神化者定天地豫四時拔陰陽移寒暑正流並生萬物無害萬類成全名尸氣皇官治者師陰陽應將然地寧天澄衆美歸焉名尸神明教治者置四時事功順道名尸賢聖因治者招賢聖而道心術敬事生和名尸后王事治者招仁聖而道知焉苟精牧神分官成章教苦利遠法制生焉法者使去私就公同知一䜘有同由者也非行私而使人合同者也故至治者弗由而名尸公伯
