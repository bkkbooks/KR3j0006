body:
  text: 韓愈讀鶡冠子鶡冠子十有六篇其詞雜黄老刑名其博選篇四稽五至之說當矣使其人遇其時援其道而施於國家功德豈少哉學問篇稱賤生於無所用中流失船一壺千金者余三讀其辭而悲之文字脫繆為之正三十有五字乙者三減者二十有二注十有二字云鶡冠子原序鶡冠子楚人也居於深山以鶡為冠號曰鶡冠子其道踳駮著書初本黄老而末流迪於刑名傳曰申韓厲名實切事情其極慘礉少恩而原於道德之意盖學之弊有如此者也故曰孔墨之後儒分為八墨離為三嗚呼可不慎哉此書雖雜黄老刑名而要其宿時若㪚亂而無家者然其竒言奥㫖亦毎毎而有也自博選篇至武靈王問凡十有九篇而退之讀此云十有六篇者非全書也今其書雖具在然文字脱繆不可考者多矣語曰書三寫魚成魯帝成虎豈虚言哉余竊閔之故為釋其可知者而其不可考者輒疑焉以俟博洽君子陸佃撰欽定四庫全書子部十鶡冠子目録雜家類一雜學之屬卷上博選第一著希第二夜行第三天則第四環流第五道端第六近迭第七卷中度萬第八王鈇第九泰鴻第十泰録第十一卷下世兵第十二備知第十三兵政第十四學問第十五世賢第十六天權第十七能天第十八武靈王第十九臣等謹案鶡冠子書漢書藝文志列於道家註曰楚人居深山以鶡為冠劉勰文心雕龍稱鶡冠緜緜亟發深言韓愈集有讀鶡冠子一首稱其博選篇四稽五至之說學問篇一壺千金之語且謂其施於國家功德豈少栁宗元集有鶡冠子辨一首乃詆其言為鄙淺謂其世兵篇多同鵩賦據司馬遷所引賈生二語以決其偽然古人著書徃徃偶用舊文古人引證亦徃徃偶隨所見如谷神不死四語今見老子中而列子乃稱為黄帝書克己復禮一語今在論語中左傳乃謂仲尼稱志有之元者善之長也八句今在文言傳中左傳乃記為穆姜語司馬遷惟稱賈生盖亦此類未可以單文孤證遽斷其偽惟其書漢志稱一篇隋志始為三卷或漢以來有所附益則未可知耳至其說雖雜刑名而大㫖本原於道德其文亦博辯宏肆自六朝至唐劉勰最號知文而韓愈最號知道二子稱之宗元乃以為鄙淺過矣此本為宋陸佃註凡十九篇其序謂愈但稱十六篇未睹其全佃北宋人其時古本韓文初出當得其真今本韓文乃亦作十九篇殆後來反據此書以改韓集猶劉禹錫河東集序稱編為三十二通而今本栁集亦反據穆修本改為四十五通也佃註惟陳振孫稍及之通考不著録晁公武讀書志亦但稱有八卷一本前三卷全同墨子後兩卷多引漢以後事公武削去前後五卷得十九篇則似亦未見佃註者殆宋時已罕傳矣乾隆四十二年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
