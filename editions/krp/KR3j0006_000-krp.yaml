front:
  text: 御製題鶡冠子鈇器原歸厚德將開卷首義即云王鈇非一世之器者厚德隆俊也注以王鈇為法制引賈誼言權勢法制人主之斤斧謂專任法制不以厚德將之而欲以持久難哉是其説雖雜刑名未嘗不歸於道德固非若黄老之專務清静亦不至如申韓之流為慘礉也雜刑匪獨老和黄朱評陸注同因顯栁謗韓譽兩不妨完帙幸存書著楚失篇却勝代稱唐宋陸佃既為之注解復序云鶡冠子楚人居深山以鶡羽為冠號曰鶡冠子其書雜黄老刑名要其宿時若㪚亂而無家然竒言奥㫖亦毎毎而有自博選至武靈王問凡十有九篇而退之讀此云十有六篇者非全書也朱子評韓文云漢唐皆以為道家者流公謂其辨施於國家功德豈少而栁子厚作辨則曰得其書而讀之言盡鄙淺所見不同如此朱子雖不置可否然其書具在栁説不免過當朱子又云漢藝文志有鶡冠子一卷而唐志云三卷謂漢時遺缺至唐而全以今書校之卷雖唐増于漢而篇則宋増于唐兹本既完備無缺佃注亦世所罕見自應重刋以廣流傳帝常師處王友處帝者與師處王者與友處亦其博選篇中語戒合書紳識弗忘
