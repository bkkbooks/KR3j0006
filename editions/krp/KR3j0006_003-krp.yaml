body:
  text: 鶡冠子卷下宋陸佃解世兵第十二道有度數故神明可交或作効也易曰始作八卦以通神明之德物有相勝故水火可用也東西南北故形名可信也有方矣然後形名著焉五帝在前三王在後上德已衰矣兵知俱起黄帝百戰百戰之數未盡聞也盖與炎帝戰於阪泉之野三與蚩尤戰於涿鹿之野七十二此其大畧也蚩尤七十二或云無二字堯伐有唐傳云堯佐帝摯受封於唐二十而登帝位今此云堯伐有唐未詳聞也伐或作代禹服或作伐有苗天不變其常地不易其則隂陽不亂其氣生死不俛其位三光不改其用神明不徙其法善用兵者其道如此非案用兵一本作用法得失不兩張成敗不兩立所謂賢不肖者古今一也君子不惰真案一本作貞人不怠怠然後懈懈然後惰故君子言惰真人言怠禮云三日不怠三月不懈無見久貧賤則據簡之伊尹酒保保傭保也太公屠牛傳曰太公少貧賣漿值天凉屠牛賣肉值天熱而肉敗管子作革或作草百里奚官奴百里奚虞人也虞亡晉主辱之以媵穆姬而飯牛於秦豈此所謂官奴者乎海内荒亂立為世師莫不天地善謀日月不息迺成四時精習象神南華曰鐻成見者驚猶鬼神豈謂是乎孰謂能之言非不學而能也素成其用先知其故所謂始乎故長乎性成乎命湯能以七十里放桀武王以百里伐紂知一不煩知一則簡千方萬曲所雜齊同㑹之有元故不能異也勝道不一制勝之道夫豈一端而已知者計全戰必勝攻必取明將不倍時而棄利勇士不怯法而滅名欲踰至德之美者其慮不與俗同徇俗則病傭欲踰至德之美難矣欲驗九天之髙者行不徑或作經請安可以問塗而至也九天具見鴻烈直經盖若南方曰朱天北方曰𤣥天中央曰鈞天之類是以忠臣不先其身而後其君寒心孤立懸命將軍野戰則國弊民罷城守則食人灼骸或作火體而易子而食析骸炊計失其國削主困為天下笑持國計者可以無詳乎固有過計有嘗或作賞試嘗試失之疏遇計失之細事貴取中而已明此所當審也是以曹沬為魯將與齊三戰而亡地千里使曹子計不顧後刎頸而死則不免為敗軍擒將曹子以為敗軍擒將非勇也國削民滅非智也身死君危非忠也夫死人之事者案一本無者字不能續人之夀故退與魯君計桓公合諸侯曹子以一劔之任刦桓公墠位之上顔色不變辭氣不悖三戰之所亡一旦而反天下震動四鄰驚駭名傳後世扶杖於小愧者大功不成故曹子去忿悁之心立終身之功棄細忿之愧立累世之名故曹子為知時魯君為知人劇辛為燕將與趙戰軍敗劇辛自剄燕以失五城自賊以為禍門身死以危其君名實俱滅是謂失此不還人之計也言其計畫無後之爾疑案注無字下有脱誤非過材之䓶也此言賢者誠重其死雖然曹沬之事適遭管仲不欲愈一小快而以齊信於諸候故能成其名也若夫李陵之降欲以報漢而卒族妻母隴西之士用為恥焉則沬之刦致豈可以為常哉矧又霸者之事也至於正徳之人誠信素明則將無與魯地而誅沬矣何足貴乎夫得道者務無大失凡人者務有小善小善積則案一本無則字多惡欲多惡則不積德不積則多難或云多惡則多難無則不下五字多難則濁濁則無知多欲則不博不博則多憂多憂則濁濁則無知欲惡者知之所昏也夫强不能者僇之其言辱案一本此六字誤作注又一本無之其言辱四字是劇辛能絶而燕王不知人也昔善戰者舉兵相從陳以五行戰以五音指天之極與神同方類類生成用一不窮明者為法微道是行齊過進退齊不過也參之天地出實觸虚吳奔東南亞夫使備西北盖知此矣禽將破軍發如鏃或作鍭矢動如雷霆暴疾𢷬虚殷若壊牆殷壊聲也執急節短孫子兵法曰其執險其節短用不縵縵避我所死就吾所生趨吾所時援或作授吾所勝故士不折北兵不困窮得此道者驅用市人乗流以逝或作遊與道翺翔翺翔授取錮據或作豫堅守呼吸鎮一作推或作損移鎮不移也與時更為一先一後音律相奏或作奉一右一左道無不可受數於天定位於地成名於人彼時之至安可復還或作復還至回復反復也還還也安可控搏控引也搏持也復還言不可禦控搏言不可止天地不倚錯以待能度數相使隂陽相攻死生相攝氣威相滅虚實相因得失浮或作得失相浮縣浮縣言無定也兵以勢勝兵法曰如轉圓石於千仞之山者勢也時不常使蚤晩絀贏反相殖生變化無窮何可勝言水激則旱矢激則逺精神回薄振蕩相轉遲速有命有命一作言息又作止息必中三五合散消息孰識其時至人遺物遺物或作不遺獨或作動與道俱縱驅委命與時徃來盛衰死生孰識其期儼然至湛孰知其尤禍乎福之所倚福乎禍之所伏禍與福如糾纆此言禍福相為表裏埶如索綯纆索也三合曰糾作案埶一本執渾沌錯紛其狀若一交解形狀孰知其則芴芒無貎貎或為根唯聖人而後決其意或作能決其意斡流遷徙固無休息小休曰息終則有始孰知其極一目之羅不可以得雀太疏故也籠中之鳥空窺不出太密故也衆人唯唯安定禍福憂喜聚門吉凶同域慶者在堂弔者在門失反為得成反為敗吳大兵强夫差以困越棲㑹稽勾踐霸世達人大觀乃見其可可或作苛橢枋一術奚足以游橢讀如隋銎之隋枋讀如方銎之方夫天下之事百出要以百變應之而今隋方一術則豈足遊於變通之㑹哉徃古來今事孰無郵郵置郵也行者過之而已故事之過者為郵舜有不孝堯有不慈文王桎梏管仲拘囚坱軋垠垠或作葬云孰􅀈得之此言大鈞播物坱軋無垠皆在爐􅀈之内孰􅀈得之至得無私泛泛乎若不繫之舟任之而已能者以濟不能者以覆天不可與謀地不可與慮聖人捐物從理與舍衆人域域域域淺狹之貎廹於嗜欲小知立趨好惡自懼夸者死權自貴矜容一本自矜容下云徇名終身謀奈無列士以下兩句詩曰垂帶悸兮是也列士徇名貪夫徇財以身逐物曰徇至博不給給或作結統之無要則雖博乃更不給何則至道常約故也知時何羞不愧不怍不肖繋繋或作敷俗賢争於時知也者争之器也名也者相軋也細故蒯蒯猶芥也芥刺鯁也一本作衣蒯作葪奚足以疑事成欲得又奚足夸此言如意與不無足欣戚千言萬説卒賞謂何此言理盡於上而彼之繁言雖累千萬猶當賞此勾踐不官勾踐嘗臣於吳二國不定文王不幽幽於羑理武王不正或作武王不執正管仲不羞辱名不與大賢功不得與三王鉦面備矣案一本得與二字缺備知第十三天髙而可知地大而可宰萬物安之人情安取伯夷叔齊能無盗而不能使人不意已横逆豈可必哉申徒狄殷之末世枯槁者也以為世溷濁不可居故負石自投於河不知水中之亂有逾甚者德之盛山無徑迹澤無橋梁不相徃來舟車不通何者其民猶赤子也老子曰含德之厚比於赤子男曰赤子女曰嬰兒有知者不以相欺役也有力者不以相臣主也是以鳥鵲之巢可俯而窺也麋鹿羣居可從而係也鳥鵲性猜瞿麋鹿性驚決故比主言之至世之衰父子相圖兄弟相疑夫父子天性也兄弟天倫也恩信素足非自外至故蹍市人之足則辭以脫悞兄則以嫗大親而已矣今德下衰而至於父子相猶兄弟相瘉者豈其性固異於古也哉盖治之之過也何者其化薄而出於相以有為也此言不能相與於無相與相為於無相為故其弊至此郭象曰夫體天地冥變化者雖手足異任五蔵殊管未嘗相與而百節同和斯相與於無相與也未嘗相為而表裏俱濟斯相為於無相為也若乃役其心志以恤手足運其股肱以營五蔵則相營愈篤而内外愈困矣盖知此也故為者敗之治者亂之敗則傰傰黨也亂則阿阿則理廢傰則義不立堯傳舜以天下故好義者以為堯智其好利者以為堯愚湯武放弑利其子好義者以為無道此言何謂也若予所學則唯好義者以為有道而好利之人以為賢為或無為字彼世不傳賢故有放君君好傰阿故有弑主夫放弑之所加亡國之所在吾未見便樂或作見其便樂而安處之者也夫處危以妄安循哀以損樂是故國有無服之喪無軍之兵可以先見也是故箕子逃逃逃禍也非謂逃而去之孔子曰微子去之箕子為之奴而搏仇牧宋世家曰南宫萬殺涽公于䝉澤大夫仇牧聞之以兵造公門萬搏牧牧齒著門死即其事也商容拘而蹇叔哭蹇叔秦臣也穆公襲鄭蹇叔哭之昔之登髙者下人代之㥄或作殪㥄怖也手足為之汗出怖故為之汗濡而上人或無人字乃始搏折枝而趨操木言傍觀者為之驚懼而登髙之人雖危莫知焉乃始搏而折枝趨而操木止之者僇止之使勿爾者覆受僇焉凡此以况處危忘安而諌者䝉辱之義是故天下寒心而人主孤立今世之處側者皆亂臣也其智足以使主不達其言足以滑政其朋黨足以相甯於利害昔湯用伊尹周用太公秦用百里百里奚也楚用申麃申包胥也齊用管子此數大夫之所以髙世者皆亡國之忠臣所以死也此言古之人其才一也或以髙世亦或以死者所遇之君異也案一本髙世下有由字由是觀之非其智能難與也乃其時命者不可及也此言伊吕申管之才人非莫及也而箕仇之徒卒以殺辱者無其時命故也唯無如是無其時命時有所至而求或作袁又或作表有有君無臣故雖時所至而上求焉時有所至而辭有臣無君故雖時有所至而下辭焉命有所至而闔或作閤也闔猶辭命有所至而闢或作闕也闢猶求賢不必得時也不肖不必失命也是故賢者守時而不肖者守命守命猶委命也今世非無舜之行也不知堯之故也非無湯武之事也不知伊尹太公之故也費仲惡來得辛紂之利而不知武王之伐之也比干子胥好忠諫而不知其主之煞之也費仲惡來者可謂知心矣而不知事比干子胥者可謂知事矣而不知心聖人者必兩備而後能究一世兵政第十四龎子問鶡冠子曰用兵之法天之地之人之賞以勸戰罰以必衆或作恐衆五者已圖然九夷用之而勝不必者其故何也得其戰矣未得其所以戰也故九夷用之而不必勝語曰以書御者不盡馬之情此之謂也故曰夫子馳亦馳夫子趨亦趨夫子奔逸絶塵而回瞠若乎其後其近是乎鶡冠子曰物有生生猶化也故金木水火未用而相制此言前期而勝也子獨不見夫閉關乎立而倚之則婦人揭之或作易揭之上仆而措之則不擇性而能舉其中句若操其端則雖選士不能絶地闗尚一身而輕重異之者勢使之然也夫以闗言之則物有而勢在矣九夷用之而勝不必者其不達物生者也此言不達事變物化故輒敗北素問曰物生之謂化物極之謂變若達物生者五尚一也耳龎子曰以五為一奈何鶡冠子曰天不能以早為晩地不能以髙為下人不能以男為女賞不能勸不勝任金帛在前不能使尫者負罰不能必不或無不字可斧鉞在後不能使啞者鳴龎子曰取功奈何鶡冠子曰天不能使人人不能使天因或作固物之然而窮達存焉之二也在權在勢在權故生財有過富在勢故用兵有過勝財之生也力之於地順之於天兵之勝也順之於道合之於人其弗知者以逆為順以患為利以逆為順故其財貧以患為利故其兵禽昔之知時者與道證或作登弗知者危神明道之所亡或作斥神明之敗何物可以留其創留猶止也使創不伸曰留故曰道乎道乎或作道道乎與神明相保乎龎子曰何如而相保鶡冠子曰賢生聖賢上生聖聖生道道生法法生神一隂一陽之謂道制而用之謂之法利用出入民咸用之謂之神神生明神下生明神明者正之末也偏生闇公生明誠信生神故曰正之末也末或無末字受之本是故相保學問第十五龎子問鶡冠子曰聖人學問服師也服事也亦有終始乎抑其拾或作拾下同當案或作拾拾字疑作捨誦記辭闔棺而止乎鶡冠子曰始於初問終於九道若不聞九道之解拾誦記辭闔棺而止以何定乎此言非獨白紛如也雖至闔棺而止尚不足以定之也故所貴乎問學者豈誦説之云乎在於得書之體得言之解龎子曰何謂九道鶡冠子曰一曰道德二曰隂陽三曰法令四曰天官五曰神徵六曰伎藝七曰人情八曰械器九曰處兵龎子曰願聞九道之事鶡冠子曰道德者操行所以為素也素如獻素之素道德操行之本故曰素也隂陽者分數所以觀氣變也周官保章氏云以星土以雲物以十有二歳以十有二風占天地之災祥法令者主道治亂國之命也天官者表儀祥兆下之應也此言學問之序道德已明而隂陽次之隂陽已明而法令次之三者備矣然後可以言治矣天官冢宰是也百官取揆故曰表儀造始而已故曰祥兆此以静唱彼以動和故曰下之應也神徵者風采光景所以序怪也祭義所謂其氣發揚于上為昭明焄蒿悽愴此百物之精也神之著也伎藝者如勝同任或為住所以出無獨異也周官六德則異之以智仁聖義忠和六藝則同之以禮樂射御書數人情者小大愚知賢不肖雄俊豪英相萬也械器者假乗焉或作馬世用國備也處兵者威柄所持立不敗或作取之地也九道形心謂之有靈形著見也后能見變而命之物至能名或曰竒見異聞為變列子曰大禹行而見之伯益知而名之盖此類也因其所為而定之若心無形靈或作虚辭或有傳字雖搏捆捆猶叩㧻也不知所之彼心為主或作至則内將使外内無巧驗精不足以揆道麤不足以驗物近則不及逺則不至龎子曰或有曾聞字禮樂仁義忠信願聞其合之於數鶡冠子曰所謂禮者不犯者也所謂樂者無菑或作薔者也所謂仁者同好者也所謂義者同惡者也所謂忠者久愈親者也所謂信者無二響者也聖人以此六者或無者字卦世得失逆順之經卦猶卜也夫離道非數不可以原缺二字緒端不要元法不可以􅀈心體􅀈猶刳也南華曰墮其肢體黜其聰明又曰夫道覆載天地君子不可以不刳心焉表術或無表字裏原術如術業之術原如原道之原雖淺不窮中虚外博雖博必虚龎子再拜曰有問戒哉雖毋如是冥或無冥字材乃健弗學孰能此天下至道而世主廢之何哉鶡冠子曰不提生於弗器器故提之賤生於無所用中河失船一壺千金壺瓠也佩之可以濟渉南人謂之腰舟貴賤無常時使物然常知善善昭繆不易一揆至今不知善善故有身死國亡絶祀滅宗細人猶然不能保夀義則自况此言細人且爾也况於己乎其義當以自况世賢第十六卓襄王問龎煖曰夫君人者亦有為其國乎卓當為悼此趙悼襄王也盖趙孝成王卒子偃立是為悼襄王襄王三年龎煖將攻燕擒其將劇辛龎煖曰王獨不聞俞跗之為醫乎已成必治鬼神避之楚王臨朝為隨兵故若堯之任人也不用親戚而必使能其治病也不任所愛必使舊醫語曰老醫少卜盖老醫更病多矣堯故使之楚王聞傳暮􅀈在身􅀈盖病也必待俞跗俞跗盖非楚人此亦寓言傳曰上古之時醫有俞跗治病不以湯液體洒鑱石橋引案机毒熨而割皮解肌訣胍結筋搦髓腦浣腸胃練精易形此雖已成所以必治而鬼神避之也卓襄王曰善龎煖曰王其忘乎昔伊尹醫殷太公醫周武王百里醫秦申麃醫郢郢荆所都原季醫晉國語曰晉文公使原季為卿范蠡醫越管仲醫齊而五國霸其善一也然道不同數卓襄王曰願聞其數煖曰王獨不聞魏文侯之問扁鵲耶扁鵲勃海鄚人也姓秦氏名越人曰子昆弟三人其孰最善為醫扁鵲曰長兄最善中兄次之扁鵲最為下魏文侯曰可得聞耶扁鵲曰長兄於病視神未有形而除之此神醫也為之於未有周官疾醫之職以五氣五聲五色視其死生兩之以九竅之變參之以九蔵之動夫昧於在神而以五氣五聲五色視其死生更以參兩驗之亦已麤矣然周官言此而已者盖中材之法也岐跗豈世有哉故名不出於家名在門内而已老子曰太上下知有之其次親之譽之中兄治病其在毫毛此明醫也治之於末亂所謂造形而悟者也故名不出於閭其閭里知之矣若扁鵲者鑱血脈投毒藥副肌膚間而名出聞於諸侯其所能愈麤其所聞愈逺魏文侯曰善使管子行醫術以扁鵲之道桓公幾能成其霸乎管仲匡救桓公常在其細故能以其君霸盖桓公實怒少姬南襲蔡管仲因而伐楚責包茅不入貢於周室桓公實北征山戎而管仲因而令燕修召公之政方是之時諸候莫或知焉此其治毫毛者也凡此者不病病一本少一病字亦至於病而治之不晩乎疾甚曰病治之無名或作治無名使或作便之無形夫病之形名著矣然後使醫此桓侯之所以免也至功之成其或作六下謂之自然針艾之功無所欣賴故其昧者謂之自然推之於治此擊壤之民所以不知堯舜之力也故良醫化之拙醫敗之雖幸不死創伸股維維牽攣也卓襄王曰善寡人雖不能無創孰能加秋毫寡人之上哉庶幾管仲者出焉天權第十七挈天地而能或無能字遊者南華所謂旁日月挾宇宙者類此謂之還或作環又或作繹名常住真際而不逐於名而不還於名之人區區外慕逐物喪已常為造化負之而走豈能挈天地而遊哉明照光照不能照已之明是也離朱方晝拭皆百歩之外明燭鬚眉而不能近視其睫則逐物不反靈於人者雖明照如月光照如日而不能照己之明何足怪哉獨化終始隨能序致獨立宇宙無封無畛域也謂之皇天地列子湯問于夏革曰四海之外奚有革曰猶齊州也東行至營人民猶是也問營之東復猶營也西行至豳人民猶是也問豳之西復猶豳也浮懸天地之明四時之運轉移日月勢若浮懸委命相鬲謂之時且然無間謂之命四時之運委之而已然而木敷金斂火炎水列譬如耳目鼻口皆有所用不能相通通而鬲謂之道道故有塞有通連萬物領天地天地下有建報重九明五字合膊膊一作搏或為宇宙二字同根命曰宇宙闔天之謂宇闢宇之謂宙二者相須而立故曰合膊同根知宇故無不容也有實而無乎處者宇也知宇故無不容知宙故無不足也有乎長而無本􅳩者宙也知宙故無不足知德德或作隐故無不安也知德故所遇於地者不擇而安之知道故無不聽也知道故所受於天者不辭而聽之知物故無不然也因其所然而然之萬物莫不然也知一而不知道故未能裏也不能視已之明故曰未能裏也昔行不知所如徃而求者則必惑列子亡羊者曰岐之中又有岐焉吾不知所之是以反也心都子曰大道以多岐喪羊學者以多方喪生索所不知求之象者則必弗得象者意之筌蹄夫索所不知求之筌蹄而不知求之言意之表豈足以得其粹哉輪人曰公之所讀是古人之糟粕已尋繹鶡冠子之意盖將發䝉解惑使人致一而求道於言意之表故有此言而下文云故人者莫不蔽於其所不見鬲於其所不聞塞於其所不開詘於其所不能制於其所不勝世俗之衆籠乎此五也而不通此未見而有形危機雖未兆見而理已有焉故曰有無軍之兵有無服之喪人之輕死生之故也人之輕安危之故也以故是以知之夫蚊䖟墜乎千仞之谿注谷曰谿乃始翺翔而成其容容或作客成其翺翔之容髙飛曰翺布翼不動曰翔牛馬墜焉一本作馬誤碎碎或作鉢而無形由是觀之則大者不便重者創深此言貴髙之蹶其患大矣老子曰奈何萬乗之主而以身輕天下案蹶一本作􅀈兵者渉死而取生陵危而取安是故言而然道而當當或作富又一作道奠富也言而然然後道而當道猶行故一蚋􅀈膚不寐至旦半糠入目四方弗治所謂蔽者豈必障於帷􅀈隐於帷薄哉細曰麤曰薄周平弗見之謂蔽昔齊人有欲金者清旦之市攫人之金以為取金之時徒見金不見人盖嗜欲之亂人心如此豈必四周有物障之也哉故病視而目弗見疾聽而耳弗聞䝉或無䝉字故知能與其所聞見俱盡句鬲鬲或作髙故奠務行事與其任力俱終句塞故四發上統上統或作上紇而不續原缺二字而消亡夫道者必有應而後至後至一作後合至觀之於易見矣事者必有德而後成夫德知事之所成成之所得而後曰我能成之成無為成之於無為得無來得之於無來夫德至矣故妙須心解而君不能得之臣子不能獻之父則得之在我而已其來豈有自哉字案心解下一本無而詳詳或作脺察其道何由然哉迷徃以觀今是以知其未能彼案一本無彼字立表而望者不惑按法而割者不疑固言有以希之也夫望而無表割無法其惑之屬耶所謂惑者非無日月之明四時之序星辰之行也因乎反兹而兹而一作慈西之惑也所謂惑者反之而已豈必無也哉列子云天地四方水火寒暑無不倒錯者盖類是也惑故疾視愈亂惇而易方疾視即上所謂病視四方故書曰譬彼病目見空中華盖空本無華由妄見故惇猶篤也易方南華所謂天地四方易位是也盖疾視至於天地四方易位則其病之篤者也非獨目視昏華而已兵有符而道有驗盖弗迷者然後見之備必豫具慮必蚤定否則惑矣下因地利制以五行左木右金前火後水中土營軍陳士不失其宜五度既正左木右金前火後水中土是也無事不舉招摇在上招摇斗之柄端主指者繕者作下禮云行前朱雀而後𤣥武左青龍而右白虎招摇在上急繕其怒即此是也繕猶繼也盖兵一鼓作氣再而衰三而竭故善戰者常無其怒使再不至於衰三不至於竭此黄帝之所以百戰而兵不敗也取法於天四時求或作生象四時求象猶言求象四時也春用蒼龍夏用赤鳥秋用白虎冬用𤣥武天地已得何物不可宰理之所居謂之地神之所形謂之天知天故能一舉而四致並起而獨或作税成鳥乗隨隨􅀈蜚垂􅀈或作輭未詳故昔善討者非以求利一作求勝將以明數一作明勝昔善戰者非以求勝將以明勝獨不見夫隐者乎或有及字設使知之其知之者屈已知之矣若其弗知者雖師而説尚不曉也隐者韜潛故其難知如此此善戰者所以必至於明勝也悲乎夫蔽象鬲塞之人未敗而崩未死而禽設兵取國武之美也不動取國文之華或為歸也士益武人不益文二句其實一也變文是以不同一者或作甚寡愛武事刻慘失之少恩不可勝論耳者可以聽調聲而不能為調聲目者可以視異形而不能為異形口者可以道神明而不能為神明凡此以明師匠能與人規矩而不能與人巧也故下文云故先王之服師術者呼往迷者不反呼之使勿徃也發䝉南華曰㣲夫子之發吾覆則吾無以見天地之大全釋約解刺約如繩約之約刺如針刺之刺達昏開明而且知焉故能説適計險說止息也適如徃也歴越踰俗軼倫越等知略之見遺跋衆人或作久求或作未絶紹逺難之在前者能當之難之在後者能章之章如彰往察來之章要領天下而無疏疏之為言失也則或作明逺乎敵國之制不為敵人所制戰勝攻取之道應物而不窮以一宰萬而不總提要而已如每事而總之焉得力而給諸類類生之耀或作翟名之所在朝廷耀名之所在也傳曰争名者於朝争利者於市究賢或作則能之變極蕭楯之元元或作無戮蕭蕭斧也干謂之楯蕭以人楯以衛已知此則知兵矣戎之字從戈從甲盖兵之道如此而已謂之無方之傳究變極無則適乎變通之㑹矣南華曰今蘄行周於魯是猶推舟於陸也勞而無功彼未知夫無方之傳應物而不窮者也著乎無封之宇或作博制事内不能究其形者或無者字用兵外不能充其功不得於内斯不可成於外矣彼兵者有天有人有地天時地利人和兵極人盡兵之事則人道得矣人極或作蔽地人極乃地地極天地極乃天天有勝天時故有勝地有維地利故有維人有成人和故有成故善用兵者慎子之所慎者戰以天勝以地維以人成三者案一本作王者明白何設不可圖所謂天者非以無驗有勝天事窈冥無所用質然而不可勝也非以日勢之長而萬物之所受服者邪日勢五行休王孤虛之屬彼天生或作士物而不物者其原隂陽也四時生長收藏而不失序者南華曰春夏先秋冬後神明之序也其權音也觸於角章於商之屬音在乎不可傳者其功英也其功以非糟粕故不可傳也故所肄學兵必先天權陳以五行戰以五音左倍宫角右挾商羽句徵君為隨徵在其後以􅔟或作轉無素之衆􅔟猶羣也韓信曰信非得素拊循士大夫所謂敺市人而戰之也其勢非制死地人自為戰寧尚得而用之乎盖知此矣陸或作陛溺溺人陸溺陸沈也盖以竒用兵其隂謀赤地能興風波故能徃來竇決不水能致風波則彼雖如川之流可使之竭也荀子曰厭其源開其竇江湖可竭獨金而不連偏任金德隆於殺伐不以四行連而輔之故其弊如下所云絶道之紀或作絶亂天之文干音之謂違或作達物之情天之不綱或作細其咎燥或作慘凶燥凶凶旱也四時之和不成故其咎凶旱老子曰必有凶年盖言是也欲無亂逆謹司天英天英或無下天英二字各失三軍無實夫不英而實孰有其物言無是也凡物之生英而不實者有矣未有不英而實者也常聖博原缺二字古今復一日者天地之所待而闔耳或作耳目則此言真聖三萬歳而成純天地與我為一矣五行不能宰五音不能制雖遺隂陽可也茍為不在此域則豈能廢隂陽之術哉故下文云故天權神曲五音術兵逸言曰天權神曲五音術兵逸言疑若兵法一書之名章以禍福禍福上或有斯字若合符節凡事者生於慮成於務失於驚能天第十八原聖心之作句情隐㣲而後或作以起情如情天地之情言聖人盡天下之情然後應物散無方而求或作永監焉道中庸故求監焉軼𤣥眇而后無軼如軼倫之軼言聖人超天下之理然後忘物抗澂幽而思謹焉道中庸故思謹焉截六際而不絞情隐㣲而求監軼𤣥眇而思謹此道之所以大而不蕩小而不廹也故能截六際而不絞六際六合也絞者廹切之辭截言以此為界盖六合之外聖人存而不論六合之内聖人論而不議觀乎孰莫或作暮何孰莫猶無也聽乎無罔極乎無係論乎窈冥湛不亂紛故能絶塵埃而立乎太清徃無與俱獨徃來無與偕獨來希備寡屬食於茍簡之田故云希備遊於寂寞之鄉故云寡屬孤而不伴未嘗設對封案一本作設非所以無疵澡雪之至疪案疵一本作保或作然獨至保猶安也所謂不行而至者是傳未有之將然見於未萌領無首之即次和而不召唱案召一本作度十五而用事或作度十十耑肝事徃來量徃來或作力而廢興巳徃者廢方來者興因動静而結生元作笙猶結猶實也生華也能天地而舉措能天能地自然形也不可改也竒耦數也不可增減也成敗兆也非而長也而女也長如長民之長故其得道以立者地能立之其得道以仆或作邳者地弗能立也其得道以安者地能安之其得道以危者地弗能安也其得道以生者天能生之其得道以死者天弗能生也其得道以案一本無以字存者天能存之其得道以亡者天弗能存也彼安危勢也存亡理也何可責於天道鬼神奚與直而推之曲而任之自安自危自存自亡天道豈容有責而鬼神亦奚與哉一者或作曰德之賢也未離乎數聖者賢之愛也愛猶慕也道者聖之所吏也吏猶任也至之所得也不離於真謂之至人故道者聖人之所吏至人之所得也案真一作貞以至或作聖圖或作國弗能載名弗能舉口不可以致其意貎不可以立其狀若道之象門戸是也道猶言也賢不肖愚知由焉出入而弗異也道者開物者也能使之由而已非齊物者也不能序之故聖道也道非聖也夫聖人者道之主也故聖道也而道非聖也道者通物者也聖者序物者也是以有先王之道而無道之先王此申聖道也道非聖也之義故聖人者後天地而生而知天地之始先天地而亡而知天地之終力不若天地而知天地之任氣不若隂陽而能為之經不若萬物多而能為之正不若衆美麗而能舉善指過焉不若道德富而能為之崇易曰崇髙莫大乎富貴髙者貴也崇者富也不若神明照而能為之主或作王不若鬼神潛而能著其靈不若金石固而能燒其勁不若方圓治或作活而能陳其形昔之得道以立至今不遷者四時太山是也其得道以危至今不可安者苓或作芩巒堙或作甄谿苓如零落之零堙塞也橐木降風橐蘀落之蘀降下也是也其得道以生至今不亡者日月星辰是也其得道以亡至今不可存者苓葉遇霜朝露遭日是也故聖人者取之於勢而弗索於察勢者其專而在已者也察按一本作蔡非者其散而之物者也物乎物芬芬份份離亂之貎孰不從一出皆出於一至一易至一而易故定審於人觀變於物口者所以抒心誠意也或不能俞受或作愛究暁俞之言然受聽受也揚其所謂或過其實故行異者相非道異者相戾詖辭者革或作庠物者也詖辭盖若告子之類告子外義聖人無之故曰革物者也聖人知其所離淫辭者因物者也淫辭盖若墨子之類墨子兼愛聖人有之故曰因物者也聖人知其所合詐辭者沮物者也詐猶邪也聖人知其所飾又從而為之辭遁辭者請物者也夷之曰命之矣聖人知其所極極猶窮也正辭者恵物者也不詖不淫不邪不遁謂之正辭聖人知其所立立者能効或作郊其所可知也莫能道其所不及㣲妙之㑹意不能到况于言乎明諭或為論外内後能定人表裏俱通而後可以印證一在而不可見道在而不可專切譬于淵其深不測凌凌乎泳澹波而不竭涵泳溢流莫之能竭彼雖至人能以練其精神修其耳目整飾其身或作飾其身體若或作與合符節小大曲制無所遺失逺近邪或作干直無所不及是以徳萬人者謂之俊徳千人者謂之豪徳百人者謂之英故聖者言之凡也一本凡也下云而察人聖者之功也此所以虛傳章文顯能未立上下異奏賢不如尊卑之術也合百家為聖人故曰言之凡也凡者統要之辭武靈王第十九武靈王問龎煥或作煖曰武靈趙武靈也龎煥盖煖之兄寡人聞飛語流傳曰百戰而勝非善之善者也不戰而勝善之善者也願聞其解龎煥曰工者貴無與争工猶善也故大上用計謀其次因人事其下戰克用計謀者熒惑敵國之主使變更淫或作謡俗使為淫俗所移哆恭憍恣而無聖人之數愛人而與無功而爵未勞而賞喜則釋罪怒則妄殺法民或作居而自慎或作填為刑民而自以慎少人而自至狹人而自以為至繁無用嗜或作蓍龜占專任卜筮而已髙義下或作不合意内之人所謂因人事者結幣帛用貨財閉近人之復其口以賂買其近臣使順其口使其所謂是者盡非也所謂非者盡是也離或作雖君之際用忠臣之路離之言間所謂戰克者其國已素破兵從而攻之因句踐用此或作因陽用此無句踐二字而吳國亡楚用此而陳蔡舉靈王八年使棄疾滅陳十年使棄疾定蔡因為陳蔡三家用此而智氏亡或作殘魏三家晋韓也韓用此而東分晉頃公十二年韓宣子與趙魏共分祁氏羊舌氏十縣東分其謂是乎今世之言兵也皆强大者必勝小弱者必滅是則小國之君無覇王者而萬乗之主無破亡也昔夏廣而湯狹殷大而周小越弱而吳强此所謂不戰或作能一而勝善之善者也此隂經之法隂經黄帝之書也夜行之道天武之類也今或僵尸百萬流血千里而勝未決也以為功計之每已不若是故聖人昭然獨思或作得恩忻然獨喜若夫耳聞金鼓之聲而希功目見旌旗或作祀祺之色而希陳手握兵刃之枋而希戰枋柄也出進合鬬而希勝是襄主之所破亡也武靈慨然歎曰存亡在身微乎哉福之所生寡人聞此日月有以自觀昔克徳者不詭命得案一本無得字要者其言不衆鶡冠子卷下
