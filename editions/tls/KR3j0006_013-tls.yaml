body:
  text: 備知第十三天高而可知地大而可宰萬物安之人情安取伯夷叔齊能無盜而不能使人不意已申徒狄以為世溷濁不可居故負石自投於河不知水中之亂有逾甚者德之盛山無徑迹澤無橋梁不相往來舟車不通何者其民猶赤子也有知者不以相欺役也有力者不以相臣主也是以鳥鵲之巢可俯而窺也麋鹿群居可從而係也至世之衰父子相圖兄弟相疑何者其化薄而出於相以有為也故為者敗之治者亂之敗則傰亂則阿阿則理廢傰則義不立堯傳舜以天下故好義者以為堯智其好利者以為堯愚湯武放弒利其子好義者以為無道而好利之人以為賢為彼世不傳賢故有放君君好傰阿故有弒主夫放弒之所加亡國之所在吾未見便樂而安處之者也夫處危以忘安循哀以損樂是故國有無服之喪無軍之兵可以先見也是故箕子逃而搏裘牧商容拘而蹇叔哭昔之登高者下人代之㥄手足為之汗出而上人乃始搏折枝而趨操木止之者僇是故天下寒心而人主孤立今世之處側者皆亂臣也其智足以使主不達其言足以滑政其朋黨足以相甯於利害昔湯用伊尹周用太公秦用百里楚用申麃齊用管子此數大夫之所以高世者皆亡國之忠臣所以死也由是觀之非其智能難與也乃其時命者不可及也唯無如是時有所至而求時有所至而辭命有所至而闔命有所至而闢賢不必得時也不肖不必失命也是故賢者守時而不肖者守命今世非無舜之行也不知堯之故也非無湯武之事也不知伊尹太公之故也費仲惡來得辛紂之利而不知武王之伐之也比干子胥好忠諫而不知其主之煞之也費仲惡來者可謂知心矣而不知事比干子胥者可謂知事矣而不知心聖人者必兩備而後能究一世
