body:
  text: 泰鴻第十泰一者執大同之制調泰鴻之氣正神明之位者也故九皇受傅以索其然之所生傅謂之得天之解傅謂之得天地之所始傅謂之道得道之常傅謂之聖人聖人之道與神明相得故曰道德郄始窮初得齊之所出九皇殊制而政莫不效焉故曰泰一泰皇問泰一曰天地人事三者孰急泰一曰愛精養神內端者所以希天天也者神明之所根也醇化四時陶埏無形刻鏤未萌離文將然者也地者承天之演備載以寧者也吾將告汝神明之極天地人事三者復一也立置臣義所謂四則散以八風揆以六合事以四時寫以八極照以三光牧以刑德調以五音正以六律分以度數表以五色改以二氣致以南北齊以晦望受以明歷日信出信入南北有極度之稽也月信死信生進退有常數之稽也列星不亂其行代而不干位之稽也天明三以定一則萬物莫不至矣三時生長一時煞刑四時而定天地盡矣夫物之始也傾傾至其有也錄錄至其成形端端王王勿損勿益幼少隨足以從師俗毋易天生毋散天樸自若則清動之則濁神聖踐承翼之位以與神皇合德按圖正端以至無極兩治四致間以止息歸時離氣以成萬業一來一往視衡低仰五官六府分之有道無鉤無繩渾沌不分大象不成事無經法精神相薄乃傷百族偷氣相時後功可立先定其利待物自至素次以法物至輒合法者天地之正器也用法不正玄德不成上聖者與天地接結六連而不解者也是故有道南面執政以衛神明左右前後靜侍中央開原流洋精微往來傾傾繩繩內持以維外紐以綱行以理埶紀以終始同一殊職立為明官五范四時各以類相從昧玄生色音聲相衡東方者萬物立止焉故調以徵南方者萬物華羽焉故調以羽西方者萬物成章焉故調以商北方者萬物錄臧焉故調以角中央者太一之位百神仰制焉故調以宮道以為先舉載神明華天上揚本出黃鍾所始為東方萬物唯隆以木華物天下盡木也使居東方主春以火照物天下盡火也使居南方主夏以金割物天下盡金也使居西方主秋以水沉物天下盡水也使居北方主冬土為大都天下盡土也使居中央守地天下盡人也以天子為正調其氣和其味聽其聲正其形迭往觀今故業可循也首尾易面地理離經奪愛令亂上滅天文理不可知神明失從文理者相明者也色味者相度者也藻華者相成者也眾者我而眾之故可以一范請也順愛之政殊類相通逆愛之政同類相亡故聖人立天為父建地為母范者非務使云必同知一期以使一人也氾錯之天地之間而人人被其和和也者無形而有味者也同和者仁也相容者義也仁義者所樂同名也能同所樂無形內政故聖知神方調於無形而物莫不從天受藻華以為神明之根者也地受時以為萬物原者也神聖詳理惡離制命之柄歛散華精以慰地責天者也調味章色正聲以定天地人事三者畢此矣
