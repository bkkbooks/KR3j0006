body:
  text: 天則第四聖王者有聽微決疑之道能屏讒權實逆淫辭絕流語去無用杜絕朋黨之門嫉妬之人不得著明非君子術數之士莫得當前故邪弗能奸禍不能中彼天地之以無極者以守度量而不可濫日不踰辰月宿其列當名服事星守弗去弦望晦朔終始相巡踰年累歲用不縵縵此天之所柄以臨斗者也中參成位四氣為政前張後極左角右鉞九文循理以省宮眾小大畢舉先無怨讎之患後無毀名敗行之咎故其威上際下交其澤四被而不鬲天之不違以不離一天若離一反還為物不創不作與天地合德節璽相信如月應日此聖人之所以宜世也知足以滑正略足以恬禍此危國之不可安亡國之不可存也故天道先貴覆者地道先貴載者人道先貴事者酒保先貴食者待物也領氣時也生殺法也循度以斷天之節也列地而守之分民而部之寒者得衣饑者得食冤者得理勞者得息聖人之所期也夫裁衣而知擇其工裁國而知索其人此固世之所公哉同而後可以見天異而後可以見人變而後可以見時化而後可以見道臨利而後可以見信臨財而後可以見仁臨難而後可以見勇臨事而後可以見術數之士九皇之制主不虛王臣不虛貴階級尊卑名號自君吏民次者無國歷寵歷錄副所以付授與天人參相結連鉤攷之具不備故也下之所逜上之可蔽斯其離人情而失天節者也緩則怠急則困見間則以奇相御人之情也舉以八極信焉而弗信天之則也差繆之間言不可合平不中律月望而晨月毀於天珠蛤蠃蚌虛于深渚上下同離也未令而知其為未使而知其往上不加務而民自盡此化之期也使而不往禁而不止上下乖謬者其道不相得也上紇下撫者遠眾之慝也陰陽不接者其理無從相及也筭不相當者人不應上也符節亡此曷曾可合也為而無害成而不敗一人唱而萬人和如體之從心此政之期也蓋毋錦杠悉動者其要在一也未見不得其𧭉而能除其疾也文武交用而不得事實者法令放而無以梟之謂也舍此而按之彼者曷曾可得也冥言易而如言難故父不能得之於子而君弗能得之於臣已見天之所以信於物矣未見人之所信於物也捐物任勢者天也捐物任勢故莫能宰而不天夫物故曲可改人可使法章物而不自許者天之道也以為奉教陳忠之臣未足恃也故法者曲制官備主用也舉善不以窅窅拾過不以冥冥決此法之所貴也若礱磨不用賜物雖詘有不效者矣上下有間於是設防知蔽並起故政在私家而弗能取重人掉權而弗能止賞加無功而弗能奪法廢不奉而弗能立罰行於非其人而弗能絕者不與其民之故也夫使百姓釋己而以上為心者教之所期也八極之舉不能時贊故可壅塞也昔者有道之取政非於耳目也夫耳之主聽目之主明一葉蔽目不見太山兩豆塞耳不聞雷霆道開而否未之聞也見遺不掇非人情也信情脩生非其天誅逆夫人僇不勝任也為成求得者事之所期也為之以民道之要也唯民知極弗之代也此聖王授業所以守制也彼教苦故民行薄失之本故爭於末人有分於處處有分於地地有分於天天有分於時時有分於數數有分於度度有分於一天居高而耳卑者此之謂也故聖王天時人之地之雅無牧能因無功多尊君卑臣非計親也任賢使能非與處也水火不相入天之制也明不能照者道弗能得也規不能包者力弗能挈也自知慧出使玉化為環玦者是政反為滑也田不因地形不能成穀為化不因民不能成俗嚴疾過也喜怒適也四者已仞非師術也形嗇而亂益者勢不相牧也德與身存亡者未可以取法也昔宥世者未有離天人而能善與國者也先王之盛名未有非士之所立者也過生於上罪死於下濁世之所以為俗也一人乎一人乎命之所極也
