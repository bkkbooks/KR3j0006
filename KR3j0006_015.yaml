body:
  text: 學問第十五龐子問鶡冠子曰聖人學問服師也亦有終始乎抑其拾誦記辭闔棺而止乎鶡冠子曰始於初問終於九道若不聞九道之解拾誦記辭闔棺而止以何定乎龐子曰何謂九道鶡冠子曰一曰道德二曰陰陽三曰法令四曰天官五曰神徵六曰伎藝七曰人情八曰械器九曰處兵龐子曰願聞九道之事鶡冠子曰道德者操行所以為素也陰陽者分數所以觀氣變也法令者主道治亂國之命也天官者表儀祥兆下之應也神徵者風采光景所以序怪也伎藝者如勝同任所以出無獨異也人情者小大愚知賢不肖雄俊豪英相萬也械器者假乘焉世用國備也處兵者威柄所持立不敗之地也九道形心謂之有靈后能見變而命之因其所為而定之若心無形靈辭雖搏捆不知所之彼心為主則內將使外內無巧驗近則不及遠則不至龐子曰禮樂仁義忠信願聞其合之於數鶡冠子曰所謂禮者不犯者也所謂樂者無菑者也所謂仁者同好者也所謂義者同惡者也所謂忠者久愈親者也所謂信者無二響者也聖人以此六者卦世得失逆順之經夫離道非數不可以緒端不要元法不可以𠟂心體表術裏原雖淺不窮中虛外博雖博必虛龐子再拜曰有問戒哉雖母如是其材乃健弗學孰能此天下至道而世主廢之何哉鶡冠子曰不提生於弗器賤生於無所用中河失船一壺千金貴賤無常時使物然常知善善昭繆不易一揆至今不知善善故有身死國亡絶祀滅宗細人猶然不能保壽義則自況
