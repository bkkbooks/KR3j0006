body:
  text: 博選第一王鈇非一世之器者博選者序德程俊也道凡四稽一曰天二曰地三曰人四曰命權人有五至一曰伯己二曰什己三曰若己四曰厮役五曰徒隸所謂天者物理理物情者也所謂地者常弗去者也所謂人者惡死樂生者也所謂命者靡不在君者也君也者端神明者也神明者以人為本者也人者以賢聖為本者也賢聖者以博選為本者也博選者以五至為本者也故北面而事之則伯己者至先趨而後息先問而後默則什己者至人趨己趨則若己者至憑几據杖指麾而使則厮役者至詬藉叱咄則徒隸之人至矣故帝者與師處王者與友處亡主與徒處故德萬人者謂之雋德千人者謂之豪德百人者謂之英德音者所謂聲也未聞音出而響過其聲者也貴者有知富者有財貧者有身信符不合事舉不成不死不生不斷不成計功而償權德而言王鈇在此孰能使營
