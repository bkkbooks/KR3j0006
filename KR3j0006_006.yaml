body:
  text: 道端第六天者萬物所以得立也地者萬物所以得安也故天定之地處之時發之物受之聖人象之夫寒溫之變非一精之所化也天下之事非一人之所能獨知也海水廣大非獨仰一川之流也是以明主之治世也急於求人弗獨為也與天與地建立四維以輔國政鉤繩相布銜橛相制參偶其備立位乃固經氣有常理以天地動逆天時不祥有祟事不任賢無功必敗出究其道入窮其變張軍衛外禍反在內所備甚遠賊在所愛是以先王置士也舉賢用能無阿於世仁人居左忠臣居前義臣居右聖人居後左法仁則春生殖前法忠則夏功立右法義則秋成熟後法聖則冬閉藏先王用之高而不墜安而不亡此萬物之本𠠕天地之門戶道德之益也此四大夫者君之所取於外也君者天也天不開門戶使下相害也進賢受上賞則下不相蔽不待事人賢士顯不蔽之功則任事之人莫不盡忠鄉曲慕義化坐自端此其道之所致德之所成也本出一人故謂之天莫不受命不可為名故謂之神至神之極見之不忒胸乖不惑務正一國一國之刑具在於身以身老世正以錯國服義行仁以一正業夫仁者君之操也義者君之行也忠者君之政也信者君之教也聖人者君之師傅也君道知人臣術知事故臨貨分財使仁犯患應難使勇受言結辭使辨慮事定計使智理民處平使謙賓奏贊見使禮用民獲衆使賢出封越境適絶國使信制天地御諸侯使聖夫仁之功善與不爭下不怨上辨士之功釋怨解難智士之功事至而治難至而應忠臣之功正言直行矯拂王過義臣之功存亡繼絶救弱誅暴信臣之功正不易言貞謙之功廢私立公禮臣之功尊君卑臣賢士之功敵國憚之四境不侵聖人之功定制於冥冥求至欲得言聽行從近親遠附明達四通內有挾度然後有以量人富者觀其所豫足以知仁貴者觀其所舉足以知忠觀其大袢長不讓少貴不讓賤足以知禮達觀其所不行足以知義受官任治觀其去就足以知智迫之不懼足以知勇口利辭巧足以知辨使之不隱足以知信貧者觀其所不取足以知廉賤者觀其所不為足以知賢測深觀天足以知聖第不失次理不相舛近塞遠閉備元變成明事知分度數獨行無道之君任用么麼動即煩濁有道之君任用俊雄動則明白二者先定素立白蔘明起氣榮相宰上合其符下稽其實時君遇人有德君子至門不言而信萬民附親遇人暴驕萬民離流上下相疑復而如環日夜相撓諫者弗受言者危身無從聞過故大臣偽而不忠是以為人君親其民如子者弗召自來故曰有光卒於美名不施而責弗受而求親故曰有殃卒於不祥夫長者之事其君也調而和之士於純厚引而化之天下好之其道日從故卒必昌夫小人之事其君也務蔽其明塞其聽乘其威以灼熱人天下惡之其崇日凶故卒必敗禍及族人此君臣之變治亂之分興壞之關梁國家之閲也逆順利害由此出生凡可無學而能者唯息與食也故先王傳道以相效屬也賢君循成法後世久長隋君不從當世滅亡
