body:
  text: 近佚第七龐子問鶡冠子曰聖人之道何先鶡冠子曰先人龐子曰人道何先鶡冠子曰先兵龐子曰何以舍天而先人乎鶡冠子曰天高而難知有福不可請有禍不可避法天則戾地廣大深厚多利而鮮威法地則辱時舉錯代更無一法時則二三者不可以立化樹俗故聖人弗法龐子曰陰陽何若鶡冠子曰神靈威明與天合勾萌動作與地俱陰陽寒暑與時至三者聖人存則治亡則亂是故先人富則驕貴則嬴兵者百歲不一用然不可一日忘也是故人道先兵龐子曰先兵奈何鶡冠子曰兵者禮義忠信也龐子曰願聞兵義鶡冠子曰失道故敢以賤逆貴不義故敢以小侵大龐子曰用之奈何鶡冠子曰行枉則禁反正則舍是故不殺降人主道所高莫貴約束得地失信聖王弗據倍言負約各將有故龐子曰弟子聞之曰地大者國實民衆者兵強兵強者先得意於天下今以所見合所不見蓋殆不然今大國之兵反詘而辭窮禁不止令不行之故何也鶡冠子曰欲知來者察往欲知古者察今擇人而用之者王用人而擇之者亡逆節之所生不肖侵賢命曰凌百姓不敢言命曰勝今者所問子慎勿言夫地大國富民衆兵強曰足士有餘力而不能以先得志於天下者其君不賢而行驕溢也不賢則不能無為而不可與致焉驕則輕敵輕敵則與所私謀其所不知為使非其任力欲取勝於非其敵不計終身之患樂須臾之説是故國君被過聽之謗醜於天下而謀臣負濫首之責于敵國敵國乃責則卻卻則説者羞其弱萬賤之直不能撓一貴之曲國被伸創其發則戰戰則是使元元之民往死邪臣之失朿也過生於上罪死於下讎既外結諸侯畜其罪則危覆社稷世主懾懼寒心孤立不伐此人二國之難不解君立不復悔曩郵過謀徙計易濫首不足蓋以纍重滅門殘疾族公謝天下以讓敵國不然則戰道不絶國創不息大乎哉夫弗知之害悲乎哉其禍之所極此倚貴離道少人自有之咎也是故師未發軔而兵可迭也今大國之君不聞先聖之道而易事群臣無明佐之大數而有滑正之碎智反義而行之逆德以將之兵詘而辭窮令不行禁不止又奚足怪哉龐子曰何若滑正之智鶡冠子曰法度無以嚖意為摸聖人按數循法尚有不全是故人不百其法者不能為天下主今無數而自因無法而自備循無上聖之檢而斷於己明人事雖備將尚何以復百己之身乎主知不明以貴為道以意為法牽時誑世逜下蔽上使事兩乖養非長失以靜為擾以安為危百姓家困人怨禍孰大焉若此者北走之日后知命亡龐子曰以人事百法奈何鶡冠子曰蒼頡作法書從甲子成史李官蒼頡不道然非蒼頡文墨不起縱法之載於圖者其於以喻心達意揚道之所謂乃才居曼之十分一耳故知百法者桀雄也若隔無形將然未有者知萬人也無萬人之智者智不能棲世學之上龐子曰得奉嚴教受業有間矣退師謀言弟子愈恐
