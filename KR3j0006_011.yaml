body:
  text: 泰録第十一人論泰鴻之內出觀神明之外定制泰一之衷以為物稽天有九鴻地有九州泰一之道九皇之傅請成於泰始之末見不詳事於名理之外范無形嘗無味以要名理之所會范者味之正也味者氣之父母也精微者天地之始也不見形臠而天下歸美焉名尸神明者大道是也夫錯行合意扶義本仁積順之所成先聖之所生也行其道者有其名為其事者有其功故天地成於元氣萬物乘於天地神聖乘於道德以究其理若上聖皇天者先聖之所倚威立有命也故致治之自在己者也招高者高招庳者庳故成形而不變者度也未離己而在彼者狎漚也陳體立節萬世不易天地之位也分物紀名文聖明別神聖之齊也法天居地去方錯圓神聖之鑒也象説名物成功遂事隱彰不相離神聖之教也故流分而神生動登而明生明見而形成形成而功存故文者所以分物也理者所以紀名也天地者同事而異域者也無規圓者天之文也無矩方者地之理也天循文以動地循理以作者也二端者神之法也神聖之人后先天地而尊者也後天地生然知天地之始先天地亡然知天地之終道包之故能知度之尊重焉故能改動之敏明焉故能制斷之精神者物之貴大者也內聖者精神之原也莫貴焉故靡不仰制焉制者所以衛精擢神致氣也幽則不泄簡則不煩不煩則精明達故能役賢能使神明百化隨而變終始從而豫神明者積精微全粹之所成也聖道神方要之極也帝制神化治之期也故師為君而學為臣上賢為天子次賢為三公高為諸侯易姓而王不以祖籍為君者欲同一善之安也彼天地動作於胸中然後事成於外萬物出入焉然後生物無害闓闔四時引移陰陽怨沒澄物天下以為自然此神聖之所以絶衆也聖原神文有驗而不可見者也故過人可見絶人未遠也神明所以類合者也故神明錮結其紘類類生成用一不窮影則隨形響則應聲故形聲者天地之師也四時之功陰陽不能獨為也聖王者不失本末故神明終始焉卒令八風三光之變經氣不常之故孰不詔請都理焉故神靈威明上變光疾徐緩急中動氣煞傷毀禍下在地故天地陰陽之受命取象於神明之效既已見矣天者氣之所總出也地者理之必然也故聖人者出之於天收之於地在天地若陰陽者杜燥濕以法義與時遷焉二者聖人存則治亡則亂者天失其文地失其理也以是知先靈王百神者上德執大道凡此者物之長也及至乎祖籍之世代繼之君身雖不賢然南面稱寡猶不果亡者其能受教乎有道之士者也不然而能守宗廟存國家者未之有也
