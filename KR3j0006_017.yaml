body:
  text: 天權第十七挈天地而能遊者謂之還名而不還於名之人明照光照不能照己之明是也獨化終始隨能序致獨立宇宙無封謂之皇天地浮懸天地之明委命相鬲謂之時通而鬲謂之道連萬物領天地合膊同根命曰宇宙知宇故無不容也知宙故無不足也知德故無不安也知道故無不聽也知物故無不然也知一而不知道故未能裏也昔行不知所如往而求者則必惑索所不知求之象者則必弗得故人者莫不蔽於其所不見鬲於其所不聞塞於其所不開詘於其所不能制於其所不勝世俗之衆籠乎此五也而不通此未見而有形故曰有無軍之兵有無服之喪人之輕死生之故也人之輕安危之故也夫蚊虻墜乎千仞之溪乃始翱翔而成其容牛馬墜焉碎而無形由是觀之則大者不便重者創深兵者涉死而取生陵危而取安是故言而然道而當故一蚋膚不寐至旦半糠入目四方弗治所謂蔽者豈必障於帷簾隱於帷薄哉周平弗見之謂蔽故病視而目弗見疾聽而耳弗聞蒙故知能與其所聞見俱盡鬲故奠務行事與其任力俱終塞故四發上統而不續而消亡夫道者必有應而後至事者必有德而後成夫德知事之所成成之所得而後曰我能成之成無為得無來詳察其道何由然哉迷往以觀今是以知其未能彼立表而望者不惑按法而割者不疑固言有以希之也夫望而無表割無法其惑之屬耶所謂惑者非無日月之明四時之序星辰之行也因乎反茲而之惑也惑故疾視愈亂悖而易方兵有符而道有驗備必豫具慮必蚤定下因地利制以五行左木右金前火後水中土營軍陳士不失其宜五度既正無事不舉招搖在上繕者作下取法於天四時求象春用蒼龍夏用赤鳥秋用白虎冬用玄武天地已得何物不可宰理之所居謂之地神之所形謂之天知天故能一舉而四致並起而獨成鳥乘隨隨𨈳蜚垂故昔善討者非以求利將以明數昔善戰者非以求勝將以明勝獨不見夫隱者乎設使知之其知之者屈己知之矣若其弗知者雖師而說尚不曉也悲乎夫蔽象鬲塞之人未敗而崩未死而禽設兵取國武之美也不動取國文之華也士益武人不益文一者寡愛不可勝論耳者可以聽調聲而不能為調聲目者可以視異形而不能為異形口者可以道神明而不能為神明故先王之服師術者呼往發蒙釋約解刺達昏開明而且知焉故能說適計險歷越踰俗軼倫越等知略之見遺跋衆人求絶紹遠難之在前者能當之難之在後者能章之要領天下而無疏則遠乎敵國之制戰勝攻取之道應物而不窮以一宰萬而不總類類生之耀名之所在究賢能之變極蕭楯之元謂之無方之傳著乎無封之宇制事內不能究其形者用兵外不能充其功彼兵者有天有人有地兵極人人極地地極天天有勝地有維人有成故善用兵者慎以天勝以地維以人成三者明白何設不可圖所謂天者非以無驗有勝非以日勢之長而萬物之所受服者邪彼天生物而不物者其原陰陽也四時生長收藏而不失序者其權音也音在乎不可傳者其功英也故所肆肄學兵必先天權陳以五行戰以五音左倍宮角右挾商羽徵君為隨以曹無素之衆陸溺溺人故能往來竇決獨金而不連絶道之紀亂天之文干音之調違物之情天之不綱其咎燥凶欲無亂逆謹司天英天英各失三軍無實夫不英而實孰有其物常聖博古今復一日者天地之所待而闔耳故天權神曲五音術兵逸言曰章以禍福若合符節凡事者生於慮成於務失於驚
