body:
  text: 武靈王第十九武靈王問龐煥曰寡人聞飛語流傳曰百戰而勝非善之善者也不戰而勝善之善者也願聞其解龐煥曰工者貴無與爭故大上用計謀其次因人事其下戰克用計謀者熒惑敵國之主使變更淫俗哆暴憍恣而無聖人之數愛人而與無功而爵未勞而賞喜則釋罪怒則妄殺法民而自慎少人而自至繁無用嗜龜占高義下合意內之人所謂因人事者結弊帛用貨財閉近人之復其口使其所謂是者盡非也所謂非者盡是也離君之際用忠臣之路所謂戰克者其國已素破兵從而攻之因句踐用此而吳國亡楚用此而陳蔡舉三家用此而智氏亡韓用此而東分今世之言兵也皆強大者必勝小弱者必滅是則小國之君無霸王者而萬乘之主無破亡也昔夏廣而湯狹殷大而周小越弱而吳強此所謂不戰而勝善之善者也此陰經之法夜行之道天武之類也今或僵尸百萬流血千里而勝未決也以為功計之每己不若是故聖人昭然獨思忻然獨喜若夫耳聞金鼓之聲而希功目見旌旗之色而希陳手握兵刃之枋而希戰出進合鬭而希勝是襄主之所破亡也武靈慨然歎曰存亡在身微乎哉福之所生寡人聞此日月有以自觀昔克德者不詭命得要者其言不眾
