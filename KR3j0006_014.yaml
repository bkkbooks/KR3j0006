body:
  text: 兵政第十四龐子問鶡冠子曰用兵之法天之地之人之賞以勸戰罰以必衆五者已圖然九夷用之而勝不必者其故何也鶡冠子曰物有生故金木水火未用而相制子獨不見夫閉關乎立而倚之則婦人揭之仆而措之則不擇性而能舉其中若操其端則雖選士不能絶地關尚一耳而輕重異者藝使之然也夫以關言之則物有而藝在矣九夷用之而勝不必者其不達物生者也若達物生者五尚一耳龐子曰以五為一奈何鶡冠子曰天不能以早為晚地不能以高為下人不能以男為女賞不能勸不勝任罰不能必不可龐子曰取功奈何鶡冠子曰天不能使人人不能使天因物之然而窮達存焉之二也在權在藝在權故生財有過富在藝故用兵有過勝財之生也力之於地順之於天兵之勝也順之於道合之於人其弗知者以逆為順以患為利以逆為順故其財貧以患為利故其兵禽昔之知時者與道證弗知者危神明道之所亡神明之敗何物可以留其創故曰道乎道乎與神明相保乎龐子曰何如而相保鶡冠子曰賢生聖聖生道道生法法生神神生明神明者正之末也末受之本是故相保
