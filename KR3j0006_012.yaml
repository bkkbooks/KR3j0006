body:
  text: 世兵第十二道有度數故神明可交也物有相勝故水火可用也東西南北故形名可信也五帝在前三王在後上德已衰矣兵知俱起黃帝百戰蚩尤七十二堯伐有唐禹服有苗天不變其常地不易其則陰陽不亂其氣生死不俛其位三光不改其用神明不徙其法得失不兩張成敗不兩立所謂賢不肖者古今一也君子不惰真人不怠無見久貧賤則據簡之伊尹酒保太公屠牛管子作革百里奚官奴海內荒亂立為世師莫不天地善謀日月不息迺成四時精習象神孰謂能之素成其用先知其故湯能以七十里放桀武王以百里伐紂知一不煩千方萬曲所雜齊同勝道不一知者計全明將不倍時而棄利勇士不怯死而滅名欲踰至德之美者其慮不與俗同欲驗九天之高者行不徑請是以忠臣不先其身而後其君寒心孤立懸命將軍野戰則國弊民罷城守則食人灼骸計失其國削主困為天下笑持國計者可以無詳乎固有過計有嘗試是以曹沫為魯將與齊三戰而亡地千里使曹子計不顧後刎頸而死則不免為敗軍擒將曹子以為敗軍擒將非勇也國削名滅非智也身死君危非忠也夫死人之事者不能續人之壽故退與魯君計桓公合諸侯曹子以一劍之任劫桓公墠位之上顏色不變辭氣不悖三戰之所亡一旦而反天下震動四鄰驚駭名傳後世扶杖於小愧者大功不成故曹子去忿悁之心立終身之功棄細忿之愧立累世之名故曹子為知時魯君為知人劇辛為燕將與趙戰軍敗劇辛自剄燕以失五城自賊以為禍門身死以危其君名實俱滅是謂失此不還人之計也非過材之莿也夫得道者務無大失凡人者務有小善小善積則多惡欲多惡則不不則多難多難則濁濁則無知多欲則不博不博則多憂多憂則濁濁則無知欲惡者知之所昏也夫強不能者僇是劇辛能絕而燕王不知人也昔善戰者舉兵相從陳以五行戰以五音指天之極與神同方類類生成用一不窮明者為法微道是行齊過進退參之天地出實觸虛禽將破軍發如鏃矢動如雷霆暴疾擣虛殷若壞牆執急節短用不縵縵避我所死就吾所生趨吾所時援吾所勝故士不折北兵不困窮得此道者驅用市人乘流以逝與道翱翔翱翔授取錮據堅守呼吸鎮移與時更為一先一後音律相奏一右一左道無不可受數於天定位於地成名於人彼時之至安可復還安可控摶天地不倚錯以待能度數相使陰陽相攻死生相攝氣威相滅虛實相因得失浮懸兵以勢勝時不常使蚤晚絀嬴反相殖生變化無窮何可勝言水激則旱矢激則遠精神回薄振蕩相轉遲速有命必中三五合散消息孰識其時至人遺物獨與道俱縱驅委命與時往來盛衰死生孰識其期儼然至湛孰知其尤禍乎福之所倚福乎禍之所伏禍與福如糾纏渾沌錯紛其狀若一交解形狀孰知其則芴芒無貌唯聖人而後決其意斡流遷徙固無休息終則有始孰知其極一目之羅不可以得雀籠中之鳥空窺不出眾人唯唯安定禍福憂喜聚門吉凶同域失反為得成反為敗吳大兵強夫差以困越棲會稽勾踐霸世達人大觀乃見其可橢枋一術奚足以游往古來今事孰無郵舜有不孝堯有不慈文王桎梏管仲拘囚坱軋無垠孰得之至得無私泛泛乎若不繫之舟能者以濟不能者以覆天不可與謀地不可與慮聖人捐物從理與舍眾人域域迫於嗜欲小知立趨好惡自懼夸者死權自貴矜容列士徇名貪夫徇財至博不給知時何羞不肖繫俗賢爭於時細故袃蒯奚足以疑事成欲得又奚足夸千言萬說卒賞謂何勾踐不官二國不定文王不幽武王不正管仲不羞辱名不與大賢功不三王鉦面備矣
