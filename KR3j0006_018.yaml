body:
  text: 能天第十八原聖心之作情隱微而後起散無方而求監焉軼玄眇而后無抗澄幽而思謹焉截六際而不絞觀乎孰莫聽乎無罔極乎無係論乎窈冥湛不亂紛故能絶塵埃而立乎太清往無與俱來無與偕希備寡屬孤而不伴所以無疵保然獨至傳未有之將然領無首之即次度十五而用事量往來而廢興因動靜而結生能天地而舉措自然形也不可改也奇耦數也不可增減也成敗兆也非而長也故其得道以立者地能立之其得道以仆者地弗能立也其得道以安者地能安之得其道以危者地弗能安也其得道以生者天能生之其得道以死者天弗能生也其得道以存者天能存之其得道以亡者天弗能存也彼安危藝也存亡理也何可責於天道鬼神奚與一者德之賢也聖者賢之愛也道者聖之所吏也至之所得也以至圖弗能載名弗能舉口不可以致其意貌不可以立其狀若道之象門戶是也賢不肖愚知由焉出入而弗異也道者開物者也非齊物者也故聖道也道非聖也道者通物者也聖者序物者也是以有先王之道而無道之先王故聖人者後天地而生而知天地之始先天地而亡而知天地之終力不若天地而知天地之任氣不若陰陽而能為之經不若萬物多而能為之正不若衆美麗而能舉善指過焉不若道德富而能為之崇不若神明照而能為之主不若鬼神潛而能著其靈不若金石固而能燒其徑不若方圓治而能陳其形昔之得道以立至今不遷者四時太山是也其得道以危至今不可安者苓巒堙溪橐木降風是也其得道以生至今不亡者日月星辰是也其得道以亡至今不可存者苓葉遇霜朝露遭日是也故聖人者取之於藝而弗索於察藝者其專而在己者也察者其散而之物者也物乎物芬芬份份孰不從一出至一易故定審於人觀變於物口者所以抒心誠意也或不能俞受究曉揚其所謂或過其實故行異者相非道異者相戾詖辭者革物者也聖人知其所離淫辭者因物者也聖人知其所合詐辭者沮物者也聖人知其所飾遁辭者請物者也聖人知其所極正辭者惠物者也聖人知其所立立者能效其所可知也莫能道其所不及明諭外內後能定人一在而不可見道在而不可專切譬于淵其深不測淩淩乎泳淡波而不竭彼雖至人能以練其精神修其耳目整飾其身若合符節小大曲制無所遺失遠近邪直無所不及是以德萬人者謂之俊德千人者謂之豪德百人者謂之英故聖者言之凡也
