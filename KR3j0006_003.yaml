body:
  text: 夜行第三天文也地理也月刑也日德也四時檢也度數節也陰陽氣也五行業也五政道也五音調也五聲故也五味事也賞罰約也此皆有驗有所以然者隨而不見其後迎而不見其首成功遂事莫知其狀圖弗能載名弗能舉強為之説曰芴乎芒乎中有象乎芒乎芴乎中有物乎窅乎冥乎中有精乎致信究情復反無貌鬼見不能為人業故聖人貴夜行
