body:
  text: 世賢第十六悼襄王問龐暖曰夫君人者亦有為其國乎龐暖曰王獨不聞俞跗之為醫乎已成必治鬼神避之楚王臨朝為隨兵故若堯之任人也不用親戚而必使能其治病也不任所愛必使舊醫楚王聞傳暮𡫴在身必待俞跗悼襄王曰善龐暖曰王其忘之乎昔伊尹醫殷太公醫周武王百里醫秦申麃醫郢原季醫晉范蠡醫越管仲醫齊而五國霸其善一也然道不同數悼襄王曰願聞其數暖曰王獨不聞魏文侯之問扁鵲耶曰子昆弟三人其孰最善為醫扁鵲曰長兄最善中兄次之扁鵲最為下也魏文侯曰可得聞邪扁鵲曰長兄於病視神未有形而除之故名不出於家中兄治病其在毫毛故名不出於閭若扁鵲者鑱血脈投毒藥割肌膚而名出聞於諸侯魏文侯曰善使管子行醫術以扁鵲之道則桓公幾能成其霸乎凡此者不病病治之無名使之無形至功之成其下謂之自然故良醫化之拙醫敗之雖幸不死創伸股綟悼襄王曰善寡人雖不能無創孰能加秋毫寡人之上哉
