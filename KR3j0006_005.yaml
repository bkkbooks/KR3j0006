body:
  text: 環流第五有一而有氣有氣而有意有意而有圖有圖而有名有名而有形有形而有事有事而有約約決而時生時立而物生故氣相加而為時約相加而為期期相加而為功功相加而為得失得失相加而為吉凶萬物相加而為勝敗莫不發於氣通於道約於事正於時離於名成於法者也法之在此者謂之近其出化彼謂之遠近而至故謂之神遠而反故謂之明明者在此其光照彼其事形此其功成彼從此化彼者法也生法者我也成法者彼也生法者日在而不厭者也生成在己謂之聖人惟聖人究道之情唯道之法公政以明斗柄東指天下皆春斗柄南指天下皆夏斗柄西指天下皆秋斗柄北指天下皆冬斗柄運於上事立於下斗柄指一方四塞俱成此道之用法也故日月不足以言明四時不足以言功一為之法以成其業故莫不道一之法立而萬物皆來屬法貴如言言者萬物之宗也是者法之所與親也非者法之所與離也是與法親故強非與法離故亡法不如言故亂其宗故生法者命也生於法者亦命也命者自然者也命之所立賢不必得不肖不必失命者挈己之文者也故有一日之命有一年之命有一時之命有終身之命終身之命無時成者也故命無所不在無所不施無所不及時或後而得之命也既有時有命引其聲合之名其得時者成命曰調引其聲合之名其失時者精神俱亡命曰乖時命者唯聖人而後能決之夫先王之道備然而世有困君其失之謂者也故所謂道者無已者也所謂德者能得人者也道德之法萬物取業無形有分名曰大孰故東西南北之道踹然其為分等也陰陽不同氣然其為和同也酸醎甘苦之味相反然其為善均也五色不同采然其為好齊也五聲不同均然其可喜一也故物無非類者動靜無非氣者是故有人將得一人氣吉有家將得一家氣吉有國將得一國氣吉其將凶者反此故同之謂一異之謂道相勝之謂埶吉凶之謂成敗賢者萬舉而一失不肖者萬舉而一得其冀善一也然則其所以為者不可一也知一之不可一也故貴道空之謂一無不備之謂道立之謂氣通之謂類氣之害人者謂之不適味之害人者謂之毒夫社不㓨則不成霧氣故相利相害也類故相成相敗也積往生跛巫以為師積毒成藥工以為醫美惡相飾命曰復周物極則反命曰環流
