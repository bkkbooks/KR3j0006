body:
  text: 著希第二道有稽德有據人主不聞要故專與運堯而無以見也道與德館而無以命也義不當格而無以更也若是置之雖安非定也端倚有位名號弗去故希人者無悖其情希世者無繆其賓文禮之野與禽獸同則言語之暴與蠻夷同謂夫君子者易親而難狎畏禍而難劫嗜利而不為非時動而不苟作體雖安之而弗敢處然後禮生焉心雖欲之而弗敢言然後義生焉夫義節欲而治禮反情而辨者也故君子弗徑情而行也夫亂世者以粗智為造意以中險為道以利為情若不相與同惡則不能相親相與同惡則有相憎說者言仁則以為誣發於義則以為誇平心而直告之則有弗信故賢者之於亂世也絶豫而無由通異類而無以告苦乎哉賢人之潛亂世也上有隨君下無直辭君有驕行民多諱言故人乖其誠能士隱其實情心雖不說弗敢不譽事業雖弗善不敢不力趨舍雖不合不敢弗從故觀賢人之於亂世也其慎勿以為定情也
